services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chura_user
      POSTGRES_PASSWORD: chura_password
      POSTGRES_DB: chura_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
    networks:
      - infra-network
    restart: unless-stopped

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - infra-network
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minio_admin minio_password); do echo 'Waiting for minio...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/chura-bucket;
      /usr/bin/mc anonymous set public local/chura-bucket;
      exit 0;
      "
    networks:
      - infra-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: chura_user
      DB_PASSWORD: chura_password
      DB_NAME: chura_db
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_password
      MINIO_BUCKET: chura-bucket
      MINIO_USE_SSL: "false"
      PUBLIC_MINIO_URL: http://localhost:9000/chura-bucket
    ports:
      - "8080:8080"
    networks:
      - infra-network
      - app-network
    depends_on:
      - db
      - minio
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      INTERNAL_API_URL: http://backend:8080

    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  infra-network:
    driver: bridge
  app-network:
    driver: bridge

volumes:
  db_data:
  minio_data:
